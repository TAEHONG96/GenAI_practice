<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketBoard - 통합 주식 현황판</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & DOM (안정적인 버전) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- ApexCharts Engine (핵심 엔진만 사용) -->
    <script src="https://unpkg.com/apexcharts@3.41.0/dist/apexcharts.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0f1a; color: #f1f5f9; margin: 0; }
        .glass-panel { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Mock Data ---
        const MARKET_INDICES = [
            { name: 'KOSPI', value: '6,483.08', change: '+0.11%', isUp: true },
            { name: 'KOSDAQ', value: '1,176.42', change: '+0.18%', isUp: true },
            { name: 'S&P 500', value: '7,108.40', change: '-0.41%', isUp: false },
            { name: 'NASDAQ', value: '24,438.50', change: '-0.89%', isUp: false },
        ];

        const TOP_STOCKS = [
            { symbol: '005930', name: '삼성전자', price: '219,250', change: '-2.34%', per: '18.4', data: [224500, 222000, 221000, 220500, 219500, 218500, 219000, 219250] },
            { symbol: '000660', name: 'SK하이닉스', price: '482,300', change: '+1.15%', per: '14.2', data: [475000, 478000, 482000, 481000, 485000, 483000, 485000, 482300] },
            { symbol: 'AAPL', name: 'Apple Inc.', price: '$352.12', change: '-0.45%', per: '32.1', data: [355, 354, 353, 352.5, 352, 351.5, 352.2, 352.12] },
            { symbol: 'NVDA', name: 'NVIDIA', price: '$1,294.52', change: '+1.21%', per: '85.2', data: [1270, 1280, 1290, 1285, 1300, 1295, 1305, 1294.52] },
        ];

        // --- UI Components ---
        const Icon = ({ name, size = 20, color = "white" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size, color }}></i>;
        };

        const App = () => {
            const [selectedStock, setSelectedStock] = useState(TOP_STOCKS[0]);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            // 차트 생성 및 업데이트 로직 (수동 제어)
            useEffect(() => {
                if (!chartRef.current) return;

                const options = {
                    chart: { type: 'area', height: 350, toolbar: { show: false }, background: 'transparent', animations: { enabled: true } },
                    stroke: { curve: 'smooth', width: 3, colors: ['#3b82f6'] },
                    fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.45, opacityTo: 0.05 } },
                    xaxis: { categories: ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '15:30'], labels: { style: { colors: '#64748b' } } },
                    yaxis: { show: false },
                    theme: { mode: 'dark' },
                    grid: { borderColor: '#1e293b', strokeDashArray: 4 },
                    series: [{ name: 'Price', data: selectedStock.data }]
                };

                // 기존 차트가 있으면 삭제 후 새로 생성 (안전함)
                if (chartInstance.current) {
                    chartInstance.current.destroy();
                }

                chartInstance.current = new ApexCharts(chartRef.current, options);
                chartInstance.current.render();

                return () => {
                    if (chartInstance.current) chartInstance.current.destroy();
                };
            }, [selectedStock]);

            return (
                <div className="flex h-screen w-full bg-[#0b0f1a] overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-64 border-r border-slate-800 p-6 flex flex-col gap-8 glass-panel hidden lg:flex">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-lg"><Icon name="line-chart" /></div>
                            <span className="text-xl font-bold tracking-tighter uppercase">MarketBoard</span>
                        </div>
                        <nav className="flex flex-col gap-2">
                            <div className="flex items-center gap-3 p-3 bg-blue-600 rounded-xl font-bold text-white"><Icon name="layout" /> 대시보드</div>
                            <div className="flex items-center gap-3 p-3 text-slate-400 hover:bg-slate-800 rounded-xl cursor-pointer"><Icon name="globe" /> 해외 주식</div>
                            <div className="flex items-center gap-3 p-3 text-slate-400 hover:bg-slate-800 rounded-xl cursor-pointer"><Icon name="newspaper" /> 뉴스</div>
                        </nav>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-grow flex flex-col overflow-hidden">
                        <header className="h-20 border-b border-slate-800 flex items-center px-8 gap-4 overflow-x-auto custom-scrollbar">
                            {MARKET_INDICES.map(idx => (
                                <div key={idx.name} className="glass-panel p-4 rounded-2xl min-w-[150px] flex flex-col gap-1">
                                    <div className="text-slate-500 text-[10px] font-bold uppercase tracking-wider">{idx.name}</div>
                                    <div className="text-lg font-bold">{idx.value}</div>
                                    <div className={`text-xs font-bold ${idx.isUp ? 'text-emerald-400' : 'text-rose-400'}`}>{idx.change}</div>
                                </div>
                            ))}
                        </header>

                        <div className="flex-grow p-8 overflow-y-auto custom-scrollbar">
                            <div className="grid grid-cols-12 gap-8">
                                {/* Main Chart Area */}
                                <div className="col-span-12 lg:col-span-8 glass-panel p-8 rounded-[2.5rem]">
                                    <div className="flex justify-between items-start mb-8">
                                        <div>
                                            <h2 className="text-3xl font-bold mb-2">{selectedStock.name}</h2>
                                            <div className="flex items-baseline gap-3">
                                                <span className="text-5xl font-black">{selectedStock.price}</span>
                                                <span className={`${selectedStock.change.startsWith('+') ? 'text-emerald-400' : 'text-rose-400'} font-bold text-xl`}>
                                                    {selectedStock.change}
                                                </span>
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            {['1D', '1W', '1M'].map(t => (
                                                <button key={t} className={`px-4 py-2 rounded-xl text-xs font-bold ${t === '1D' ? 'bg-blue-600' : 'bg-slate-800 text-slate-400'}`}>{t}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div id="main-chart" ref={chartRef}></div>
                                </div>

                                {/* Watchlist */}
                                <div className="col-span-12 lg:col-span-4 glass-panel p-8 rounded-[2.5rem]">
                                    <h3 className="text-sm font-bold text-slate-500 uppercase tracking-widest mb-6">Watchlist</h3>
                                    <div className="flex flex-col gap-3">
                                        {TOP_STOCKS.map(s => (
                                            <div 
                                                key={s.symbol} 
                                                onClick={() => setSelectedStock(s)}
                                                className={`p-5 rounded-2xl border transition-all duration-200 ${
                                                    selectedStock.symbol === s.symbol ? 'border-blue-500 bg-blue-500/10' : 'border-slate-800 hover:bg-slate-800/50'
                                                } flex justify-between items-center cursor-pointer`}
                                            >
                                                <div>
                                                    <div className="font-bold text-base">{s.name}</div>
                                                    <div className="text-xs text-slate-500 font-mono">{s.symbol}</div>
                                                </div>
                                                <div className="text-right">
                                                    <div className="font-bold">{s.price}</div>
                                                    <div className="text-[10px] text-slate-400">PER {s.per}x</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
